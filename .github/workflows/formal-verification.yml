name: Formal Verification

on:
  workflow_dispatch:

jobs:
  frama-c:
    name: Frama-C WP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Frama-C and WP prover dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y frama-c why3 z3
          why3 config detect

      - name: Show Frama-C version
        run: frama-c -version

      - name: Run ACSL contract verification
        run: make verify WP_PROVER=z3

      - name: Run FIFO proof harness verification
        run: make verify-fifo WP_PROVER=z3
